<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        AI Job Market Analyzer
    </div>

    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('jobs') }}">Jobs</a>
        <a href="{{ url_for('about') }}">About</a>
        <a href="{{ url_for('contact') }}">Contact</a>
    </div>

</nav>

<div class="container">

    <div class="card">

        <h1>Upload Resume</h1>

        <p>Select your resume in PDF format.</p>

        <form action="{{ url_for('predict') }}"
              method="POST"
              enctype="multipart/form-data">

            <input
                type="file"
                name="resume"
                accept=".pdf"
                required>

            <br><br>

            <button type="submit">
                Analyze Resume
            </button>

        </form>

    </div>

</div>

<footer>

    AI Job Market Analyzer | Powered by Artificial Intelligence

</footer>

</body>

</html>
